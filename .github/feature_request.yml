name: "🚀 Feature Request"
description: Propose a new application utility, leisure game, or system driver expansion.
title: "[FEATURE]: "
labels: ["enhancement", "feature"]
body:
  - type: textarea
    id: concept
    attributes:
      label: Feature Concept
      description: What system enhancement or application utility would you like to see added to Avocet?
      placeholder: "e.g., A custom 2D audio waveform sound card driver added to kernel/drivers/..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Implementation Details
      description: Describe how you want this feature to interact with the current layout trees.
      placeholder: "e.g., Expand widgets.py to support a sound bar component that interfaces with a new C extension module..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches considered
      description: Describe any alternative software models or fallbacks you have looked into.
