name: "🐛 Bug Report"
description: Report a low-level kernel crash, compiler error, or UI layout failure.
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue! Please provide as much structural detail as possible to help us isolate the bug.
  - type: dropdown
    id: subsystem
    attributes:
      label: Affected Subsystem
      description: Select the main directory branch where the error is occurring.
      multiple: false
      options:
        - "Kernel Engine (boot, cpu, memory, drivers)"
        - "Shell Console (C backend or Python frontend)"
        - "Python Engine / Avocet UI Toolkit"
        - "Utilities & Leisure Games"
        - "Build System (Makefiles, Toolchains, VS Code)"
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Host Environment
      description: Where are you compiling or running the Avocet Framework?
      multiple: false
      options:
        - "Windows 11 / MSYS2 MinGW64 Terminal"
        - "Windows 10 / MSYS2 MinGW64 Terminal"
        - "Linux Host (Ubuntu, Fedora, Arch)"
        - "QEMU Bare-Metal Emulator Target"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Provide a clear and concise explanation of what the bug is.
      placeholder: "e.g., The kernel throws a triple fault inside QEMU right after initializing the VMM..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: What exact steps or commands did you run to trigger this state?
      placeholder: |
        1. Open MinGW64 terminal.
        2. Run 'make desktop'.
        3. Open the Calculator app and press '='.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Compiler or Terminal Logs
      description: Paste any error messages, hex dumps, or compiler warning outputs here.
      render: text
